services:
  - type: web
    name: line-ai-home-helper
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_GOOGLE_SEARCH
        value: false
      - key: BOT_NAME
        value: 和芮居家小幫手
      - key: BUSINESS_NAME
        value: 和芮居家
      - key: REPLY_LANGUAGE
        value: 繁體中文
      - key: HUMAN_HANDOFF_TEXT
        value: 我已幫你記錄，稍後會由真人協助你。
